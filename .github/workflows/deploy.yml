name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  schedule:
    # Refresh every 4 hours so schedule changes on ai.engineer propagate
    # without needing a code push
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Fetch schedule data (server-side, no CORS needed)
        run: |
          mkdir -p public/data
          # Use a real browser User-Agent so Cloudflare / bot-protection lets the request through.
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          curl -fsSL -A "$UA" -H "Accept: application/json" \
            https://ai.engineer/europe/sessions.json -o public/data/sessions.json || true
          curl -fsSL -A "$UA" -H "Accept: application/json" \
            https://ai.engineer/europe/speakers.json -o public/data/speakers.json || true
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
